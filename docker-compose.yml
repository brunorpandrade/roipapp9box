services:
  mysql:
    image: mysql:8.0
    container_name: roipapp9box-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-roip_local_root}
      MYSQL_DATABASE: roip
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h 127.0.0.1 -uroot -p"$$MYSQL_ROOT_PASSWORD"']
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
